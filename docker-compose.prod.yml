services:
  app:
    image: pralovmalla/agentic-rag:latest
    expose:
      - "8000"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_SSL: "false"
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - checkpoint-data:/app/data/checkpoints
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:1.5.9
    volumes:
      - chroma-data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  checkpoint-data:
  chroma-data:
