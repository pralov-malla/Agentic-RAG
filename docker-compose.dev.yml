services:
  app:
    build:
      context: .
    ports:
      - "8000:8000"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_SSL: "false"
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    user: root
    command: uvicorn rag_chatbot.main:app --app-dir /app/src --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src

  chromadb:
    image: chromadb/chroma:1.5.9
    ports:
      - "8100:8000"
    volumes:
      - chroma-data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  chroma-data:
