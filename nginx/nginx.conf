events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name agenticai.billingwithsoup.com;

        # Allow Let's Encrypt to verify domain ownership
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name agenticai.billingwithsoup.com;

        ssl_certificate /etc/letsencrypt/live/agenticai.billingwithsoup.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agenticai.billingwithsoup.com/privkey.pem;

        # Basic SSL security
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
